spring.application.name=SkillForge API

# Database configuration (Switched to H2 in-memory so you don't need to install MySQL!)
spring.datasource.url=jdbc:h2:mem:skillforgedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate ddl-auto (update the schema automatically)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Web Console — view the database at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Server Port
server.port=8080

# Static frontend (HTML/CSS/JS) is served from the top-level `frontend/` folder.
# We support both common launch working directories: repo root and backend/.
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,classpath:/resources/,classpath:/META-INF/resources/,file:../frontend/,file:frontend/

# OpenAI API Key (Required for deep logic, logic reasoning tutoring)
# I have implemented a 'Mock Mode' so the app works even without this key!
# To enable real AI reasoning, replace YOUR_OPENAI_API_KEY_HERE with your real key.
openai.api.key=YOUR_OPENAI_API_KEY_HERE
